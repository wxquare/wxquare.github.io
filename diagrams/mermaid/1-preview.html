ccess Layer&quot;]</span><br><span class="line">        CDN[&quot;CDN - DNS&quot;]</span><br><span class="line">        LB[&quot;Load Balancer - Nginx&quot;]</span><br><span class="line">        APIGW[&quot;Web API Gateway&lt;br/&gt;Go/Gin, 限流熔断&quot;]</span><br><span class="line">        Auth[&quot;鉴权服务 Auth&quot;]</span><br><span class="line">    end</span><br><span class="line"></span><br><span class="line">    %% 业务聚合层</span><br><span class="line">    subgraph BFF_Layer [&quot;3. 业务聚合层 BFF / Aggregation&quot;]</span><br><span class="line">        BFF_Search[&quot;导购/搜索聚合&quot;]</span><br><span class="line">        BFF_Trade[&quot;交易/收银台聚合&quot;]</span><br><span class="line">    end</span><br><span class="line"></span><br><span class="line">    %% 核心领域服务层</span><br><span class="line">    subgraph Domain_Services [&quot;4. 核心领域服务层 Domain Microservices&quot;]</span><br><span class="line">        </span><br><span class="line">        subgraph Listing_Domain [&quot;商品域 Listing System&quot;]</span><br><span class="line">            Listing[&quot;Listing Service&lt;br/&gt;商品主数据/异构模型&quot;]</span><br><span class="line">            Stock[&quot;Inventory Service&lt;br/&gt;库存管理&quot;]</span><br><span class="line">            Search[&quot;Search Service&lt;br/&gt;ES索引/检索&quot;]</span><br><span class="line">        end</span><br><span class="line"></span><br><span class="line">        subgraph Trade_Domain [&quot;交易域 Order System&quot;]</span><br><span class="line">            Order[&quot;Order Service&lt;br/&gt;订单状态机/核心交易&quot;]</span><br><span class="line">            Price[&quot;Price Center&lt;br/&gt;计价引擎/资损风控&quot;]</span><br><span class="line">        end</span><br><span class="line"></span><br><span class="line">        subgraph Supply_Domain [&quot;履约域 Hub &amp; Fulfillment&quot;]</span><br><span class="line">            Hub[&quot;Hub Center&lt;br/&gt;供应商集成/路由&quot;]</span><br><span class="line">            Fulfill[&quot;Fulfillment Service&lt;br/&gt;履约/发货&quot;]</span><br><span class="line">            Recon[&quot;Reconciliation&lt;br/&gt;对账/核算&quot;]</span><br><span class="line">        end</span><br><span class="line"></span><br><span class="line">        subgraph Mkt_Domain [&quot;营销域 Marketing&quot;]</span><br><span class="line">            Promo[&quot;Promotion Engine&lt;br/&gt;优惠券/活动&quot;]</span><br><span class="line">            Coins[&quot;Coins Service&lt;br/&gt;TCC资产扣减&quot;]</span><br><span class="line">        end</span><br><span class="line">    end</span><br><span class="line"></span><br><span class="line">    %% 基础设施与存储层</span><br><span class="line">    subgraph Infra_Layer [&quot;5. 数据与基础设施层 Data &amp; Infrastructure&quot;]</span><br><span class="line">        MySQL[(&quot;MySQL Sharding&lt;br/&gt;订单/商品核心&quot;)]</span><br><span class="line">        Redis[(&quot;Redis Cluster&lt;br/&gt;热点缓存/分布式锁&quot;)]</span><br><span class="line">        ES[(&quot;ElasticSearch&lt;br/&gt;商品搜索/日志&quot;)]</span><br><span class="line">        HBase[(&quot;HBase&lt;br/&gt;历史报价/归档&quot;)]</span><br><span class="line">        Kafka[&quot;Kafka - RabbitMQ&lt;br/&gt;消息队列/削峰&quot;]</span><br><span class="line">        ZK[&quot;Zookeeper - Spex&lt;br/&gt;注册中心&quot;]</span><br><span class="line">    end</span><br><span class="line"></span><br><span class="line">    %% 外部依赖</span><br><span class="line">    subgraph External [&quot;6. 外部依赖 External Systems&quot;]</span><br><span class="line">        SPM[&quot;SPM Shopee Pay&lt;br/&gt;支付网关&quot;]</span><br><span class="line">        Suppliers[&quot;外部供应商&lt;br/&gt;Agoda/Telcos/Billers&quot;]</span><br><span class="line">        Risk[&quot;Risk Control&lt;br/&gt;风控系统&quot;]</span><br><span class="line">    end</span><br><span class="line"></span><br><span class="line">    %% 连线关系</span><br><span class="line">    App --&gt; CDN</span><br><span class="line">    Web --&gt; CDN</span><br><span class="line">    OpenAPI --&gt; APIGW</span><br><span class="line">    CDN --&gt; LB</span><br><span
