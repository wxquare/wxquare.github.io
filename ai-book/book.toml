[book]
title = "大模型与 AI 工程实践"
description = "大模型基础、AI 编程、Agent 架构与实战案例（书名暂定，可在 book.toml 中修改）"
authors = ["wxquare"]
language = "zh-CN"
src = "src"

[build]
build-dir = "book"

[preprocessor.mermaid]
command = "mdbook-mermaid"

[output.html]
site-url = "/ai-book/"
git-repository-url = "https://github.com/wxquare/wxquare.github.io"
additional-js = ["mermaid.min.js", "mermaid-init.js"]

[output.html.fold]
enable = true
level = 0

[output.html.search]
enable = true
