[book]
title = "AI工程实践：从编程到Agent的完整指南"
description = "面向有经验AI工程师的实战指南，涵盖AI编程、Agent系统设计与完整案例"
authors = ["wxquare"]
language = "zh-CN"
src = "src"

[build]
build-dir = "book"

[preprocessor.mermaid]
command = "mdbook-mermaid"
optional = true

[output.html]
site-url = "/ai-book/"
git-repository-url = "https://github.com/wxquare/wxquare.github.io"
additional-js = ["mermaid.min.js", "mermaid-init.js"]

[output.html.fold]
enable = true
level = 0

[output.html.search]
enable = true
