name: Deploy eCommerce Book

on:
  push:
    branches: [ hexo ]
    paths:
      - 'ecommerce-book/**'
      - '.github/workflows/deploy-ebook.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
    
    - name: Cache cargo packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/bin/mdbook-mermaid
          ~/.cargo/.crates.toml
          ~/.cargo/.crates2.json
        key: ${{ runner.os }}-cargo-mdbook-mermaid-0.17.0
        restore-keys: |
          ${{ runner.os }}-cargo-mdbook-mermaid-0.17
    
    - name: Setup mdBook
      uses: peaceiris/actions-mdbook@v1
      with:
        mdbook-version: 'latest'
    
    - name: Install and initialize mdbook-mermaid
      run: |
        cargo install mdbook-mermaid --version 0.17.0 --locked --force
        cd ecommerce-book
        mdbook-mermaid install .
    
    - name: Build book
      run: |
        cd ecommerce-book
        mdbook build
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./ecommerce-book/book
        publish_branch: master
        destination_dir: ecommerce-book
        keep_files: true
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'
