<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" width="960" height="560">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    .title { fill: #111827; font-size: 22px; font-weight: 700; }
    .subtitle { fill: #6b7280; font-size: 13px; }
    .state-title { fill: #111827; font-size: 14px; font-weight: 700; }
    .state-sub { fill: #6b7280; font-size: 11px; }
    .edge-label { fill: #6b7280; font-size: 10px; font-weight: 600; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
  </defs>
  <rect width="960" height="560" fill="#ffffff"/>
  <text x="32" y="34" class="title">商品生命周期状态机</text>
  <text x="32" y="58" class="subtitle">辅助图回答：商品主状态怎么变，QC、发布、上线、下架和归档之间的边界在哪里。</text>

  <circle cx="78" cy="150" r="8" fill="#111827"/>

  <rect x="130" y="116" width="132" height="68" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="196" y="143" text-anchor="middle" class="state-title">DRAFT</text>
  <text x="196" y="162" text-anchor="middle" class="state-sub">草稿，可反复编辑</text>

  <rect x="330" y="116" width="132" height="68" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="396" y="143" text-anchor="middle" class="state-title">VALIDATING</text>
  <text x="396" y="162" text-anchor="middle" class="state-sub">模板与契约校验</text>

  <polygon points="596,112 682,150 596,188 510,150" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="596" y="146" text-anchor="middle" class="state-title">Policy?</text>
  <text x="596" y="164" text-anchor="middle" class="state-sub">来源 + 风险</text>

  <rect x="732" y="116" width="132" height="68" rx="10" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="798" y="143" text-anchor="middle" class="state-title">QC_PENDING</text>
  <text x="798" y="162" text-anchor="middle" class="state-sub">等待审核</text>

  <rect x="732" y="244" width="132" height="68" rx="10" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="798" y="271" text-anchor="middle" class="state-title">QC_APPROVED</text>
  <text x="798" y="290" text-anchor="middle" class="state-sub">审核通过</text>

  <rect x="530" y="244" width="132" height="68" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="596" y="271" text-anchor="middle" class="state-title">PUBLISHING</text>
  <text x="596" y="290" text-anchor="middle" class="state-sub">发布事务执行</text>

  <rect x="330" y="244" width="132" height="68" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="396" y="271" text-anchor="middle" class="state-title">PUBLISHED</text>
  <text x="396" y="290" text-anchor="middle" class="state-sub">生成版本快照</text>

  <rect x="130" y="244" width="132" height="68" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="196" y="271" text-anchor="middle" class="state-title">ONLINE</text>
  <text x="196" y="290" text-anchor="middle" class="state-sub">可搜索可下单</text>

  <rect x="130" y="382" width="132" height="68" rx="10" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="196" y="409" text-anchor="middle" class="state-title">OFFLINE</text>
  <text x="196" y="428" text-anchor="middle" class="state-sub">下架不可售</text>

  <rect x="330" y="382" width="132" height="68" rx="10" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="396" y="409" text-anchor="middle" class="state-title">ARCHIVED</text>
  <text x="396" y="428" text-anchor="middle" class="state-sub">归档不可编辑</text>

  <rect x="530" y="382" width="132" height="68" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="596" y="409" text-anchor="middle" class="state-title">REJECTED</text>
  <text x="596" y="428" text-anchor="middle" class="state-sub">驳回回草稿</text>

  <circle cx="840" cy="500" r="13" fill="none" stroke="#111827" stroke-width="1.5"/>
  <circle cx="840" cy="500" r="8" fill="#111827"/>

  <path d="M86 150 L130 150" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M262 150 L330 150" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M462 150 L510 150" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M682 150 L732 150" stroke="#9333ea" stroke-width="2" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M798 184 L798 244" stroke="#9333ea" stroke-width="2" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M732 278 L662 278" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M530 278 L462 278" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M330 278 L262 278" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M596 188 L596 244" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M864 150 L910 150 L910 416 L662 416" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow-red)"/>
  <path d="M596 382 L596 330 L480 330 L480 90 L196 90 L196 116" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow-red)"/>
  <path d="M196 312 L196 382" stroke="#9333ea" stroke-width="2" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M196 382 L196 312" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M262 416 L330 416" stroke="#6b7280" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M462 416 L500 416 L500 500 L827 500" stroke="#6b7280" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>

  <text x="286" y="142" class="edge-label">提交</text>
  <text x="690" y="141" class="edge-label">商家/高风险</text>
  <text x="604" y="221" class="edge-label">运营/低风险</text>
  <text x="677" y="270" class="edge-label">QC 通过</text>
  <text x="279" y="270" class="edge-label">可售检查</text>
  <text x="608" y="362" class="edge-label">QC 驳回</text>
  <text x="207" y="356" class="edge-label">下架</text>
  <text x="204" y="334" class="edge-label">重新上架</text>
  <text x="278" y="407" class="edge-label">归档检查</text>
</svg>
