<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 760" width="960" height="760">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    .title { fill: #111827; font-size: 22px; font-weight: 700; }
    .subtitle { fill: #6b7280; font-size: 13px; }
    .lane-label { fill: #374151; font-size: 13px; font-weight: 700; }
    .node-title { fill: #111827; font-size: 13px; font-weight: 700; }
    .node-sub { fill: #6b7280; font-size: 11px; }
    .arrow-label { fill: #6b7280; font-size: 10px; font-weight: 600; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="960" height="760" fill="#ffffff"/>
  <text x="32" y="34" class="title">商品创建到发布上线泳道流程</text>
  <text x="32" y="58" class="subtitle">主图回答：谁在什么时候做什么，哪些步骤是发布前门禁，哪些步骤异步刷新。</text>

  <rect x="28" y="86" width="904" height="78" rx="8" fill="#f8fafc" stroke="#e5e7eb"/>
  <rect x="28" y="174" width="904" height="78" rx="8" fill="#ffffff" stroke="#e5e7eb"/>
  <rect x="28" y="262" width="904" height="78" rx="8" fill="#f8fafc" stroke="#e5e7eb"/>
  <rect x="28" y="350" width="904" height="78" rx="8" fill="#ffffff" stroke="#e5e7eb"/>
  <rect x="28" y="438" width="904" height="78" rx="8" fill="#f8fafc" stroke="#e5e7eb"/>
  <rect x="28" y="526" width="904" height="78" rx="8" fill="#ffffff" stroke="#e5e7eb"/>
  <rect x="28" y="614" width="904" height="78" rx="8" fill="#f8fafc" stroke="#e5e7eb"/>

  <text x="44" y="118" class="lane-label">运营 / 商家</text>
  <text x="44" y="206" class="lane-label">供给运营平台</text>
  <text x="44" y="294" class="lane-label">QC 审核</text>
  <text x="44" y="382" class="lane-label">商品中心</text>
  <text x="44" y="470" class="lane-label">Outbox</text>
  <text x="44" y="558" class="lane-label">下游系统</text>
  <text x="44" y="646" class="lane-label">C 端</text>

  <rect x="150" y="102" width="112" height="46" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="206" y="122" text-anchor="middle" class="node-title">选择类目</text>
  <text x="206" y="139" text-anchor="middle" class="node-sub">加载模板</text>

  <rect x="300" y="102" width="112" height="46" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="356" y="122" text-anchor="middle" class="node-title">填写契约</text>
  <text x="356" y="139" text-anchor="middle" class="node-sub">商品/库存/履约</text>

  <rect x="450" y="102" width="112" height="46" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="506" y="122" text-anchor="middle" class="node-title">提交商品</text>
  <text x="506" y="139" text-anchor="middle" class="node-sub">同步反馈</text>

  <rect x="150" y="190" width="112" height="46" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="206" y="210" text-anchor="middle" class="node-title">Draft</text>
  <text x="206" y="227" text-anchor="middle" class="node-sub">可反复保存</text>

  <rect x="300" y="190" width="112" height="46" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="356" y="210" text-anchor="middle" class="node-title">Task / Item</text>
  <text x="356" y="227" text-anchor="middle" class="node-sub">审计与进度</text>

  <rect x="450" y="190" width="112" height="46" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="506" y="210" text-anchor="middle" class="node-title">Staging</text>
  <text x="506" y="227" text-anchor="middle" class="node-sub">发布前隔离</text>

  <rect x="600" y="190" width="112" height="46" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="656" y="210" text-anchor="middle" class="node-title">Validation</text>
  <text x="656" y="227" text-anchor="middle" class="node-sub">模型与契约</text>

  <polygon points="806,185 882,213 806,241 730,213" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="806" y="209" text-anchor="middle" class="node-title">准入策略</text>
  <text x="806" y="226" text-anchor="middle" class="node-sub">来源 + 风险</text>

  <rect x="600" y="278" width="112" height="46" rx="8" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="656" y="298" text-anchor="middle" class="node-title">自动准入</text>
  <text x="656" y="315" text-anchor="middle" class="node-sub">运营 / 低风险</text>

  <rect x="750" y="278" width="112" height="46" rx="8" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="806" y="298" text-anchor="middle" class="node-title">QC 审核</text>
  <text x="806" y="315" text-anchor="middle" class="node-sub">商家 / 高风险</text>

  <rect x="150" y="278" width="112" height="46" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="206" y="298" text-anchor="middle" class="node-title">驳回修复</text>
  <text x="206" y="315" text-anchor="middle" class="node-sub">回到 Draft</text>

  <rect x="450" y="366" width="112" height="46" rx="8" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="506" y="386" text-anchor="middle" class="node-title">发布事务</text>
  <text x="506" y="403" text-anchor="middle" class="node-sub">强一致写入</text>

  <rect x="600" y="366" width="112" height="46" rx="8" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="656" y="386" text-anchor="middle" class="node-title">主数据</text>
  <text x="656" y="403" text-anchor="middle" class="node-sub">Resource/SPU/SKU</text>

  <rect x="750" y="366" width="112" height="46" rx="8" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="806" y="386" text-anchor="middle" class="node-title">发布快照</text>
  <text x="806" y="403" text-anchor="middle" class="node-sub">publish_version</text>

  <rect x="600" y="454" width="112" height="46" rx="8" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="656" y="474" text-anchor="middle" class="node-title">Outbox 事件</text>
  <text x="656" y="491" text-anchor="middle" class="node-sub">同事务写入</text>

  <rect x="750" y="454" width="112" height="46" rx="8" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="806" y="474" text-anchor="middle" class="node-title">补偿重试</text>
  <text x="806" y="491" text-anchor="middle" class="node-sub">失败可恢复</text>

  <rect x="450" y="542" width="112" height="46" rx="8" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.5"/>
  <text x="506" y="562" text-anchor="middle" class="node-title">搜索索引</text>
  <text x="506" y="579" text-anchor="middle" class="node-sub">列表可搜</text>

  <rect x="600" y="542" width="112" height="46" rx="8" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.5"/>
  <text x="656" y="562" text-anchor="middle" class="node-title">缓存失效</text>
  <text x="656" y="579" text-anchor="middle" class="node-sub">详情刷新</text>

  <rect x="750" y="542" width="112" height="46" rx="8" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.5"/>
  <text x="806" y="562" text-anchor="middle" class="node-title">可售刷新</text>
  <text x="806" y="579" text-anchor="middle" class="node-sub">营销资格/计价投影</text>

  <rect x="450" y="630" width="112" height="46" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="506" y="650" text-anchor="middle" class="node-title">列表可搜</text>
  <text x="506" y="667" text-anchor="middle" class="node-sub">Searchable</text>

  <rect x="600" y="630" width="112" height="46" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="656" y="650" text-anchor="middle" class="node-title">详情可看</text>
  <text x="656" y="667" text-anchor="middle" class="node-sub">Visible</text>

  <rect x="750" y="630" width="112" height="46" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="806" y="650" text-anchor="middle" class="node-title">下单可校验</text>
  <text x="806" y="667" text-anchor="middle" class="node-sub">Orderable</text>

