<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 680" width="960" height="680">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    .title { fill: #111827; font-size: 22px; font-weight: 700; }
    .subtitle { fill: #6b7280; font-size: 13px; }
    .node-title { fill: #111827; font-size: 13px; font-weight: 700; }
    .node-sub { fill: #6b7280; font-size: 11px; }
    .arrow-label { fill: #374151; font-size: 10px; font-weight: 600; }
    .group-label { fill: #6b7280; font-size: 11px; font-weight: 700; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>
  <rect width="960" height="680" fill="#ffffff"/>
  <text x="32" y="34" class="title">商品供给发布 Data Flow Diagram</text>
  <text x="32" y="58" class="subtitle">辅助图回答：数据在哪些表之间流转，哪些是正式表，哪些是审计、补偿和下游投影。</text>

  <rect x="28" y="86" width="904" height="160" rx="10" fill="#f8fafc" stroke="#e5e7eb" stroke-dasharray="6,4"/>
  <text x="44" y="110" class="group-label">供给控制面：输入、任务、暂存、校验</text>
  <rect x="28" y="274" width="904" height="146" rx="10" fill="#ffffff" stroke="#e5e7eb" stroke-dasharray="6,4"/>
  <text x="44" y="298" class="group-label">发布准入面：Diff、来源策略、QC、发布事务</text>
  <rect x="28" y="448" width="904" height="152" rx="10" fill="#f8fafc" stroke="#e5e7eb" stroke-dasharray="6,4"/>
  <text x="44" y="472" class="group-label">正式数据与下游投影：可搜、可看、可下单</text>

  <path d="M70,136 L160,136 L174,150 L174,198 L70,198 Z" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <path d="M160,136 L160,150 L174,150" fill="none" stroke="#bfdbfe" stroke-width="1"/>
  <text x="122" y="160" text-anchor="middle" class="node-title">入口输入</text>
  <text x="122" y="178" text-anchor="middle" class="node-sub">表单/文件/API</text>

  <rect x="222" y="124" width="126" height="74" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="285" y="151" text-anchor="middle" class="node-title">Draft</text>
  <text x="285" y="169" text-anchor="middle" class="node-sub">编辑态草稿</text>
  <text x="285" y="186" text-anchor="middle" class="node-sub">draft_payload</text>

  <rect x="396" y="124" width="126" height="74" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="459" y="151" text-anchor="middle" class="node-title">Task / Item</text>
  <text x="459" y="169" text-anchor="middle" class="node-sub">任务与行级状态</text>
  <text x="459" y="186" text-anchor="middle" class="node-sub">progress/error</text>

  <rect x="570" y="124" width="126" height="74" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="633" y="151" text-anchor="middle" class="node-title">Staging</text>
  <text x="633" y="169" text-anchor="middle" class="node-sub">标准化快照</text>
  <text x="633" y="186" text-anchor="middle" class="node-sub">payload_hash</text>

  <rect x="744" y="124" width="126" height="74" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="807" y="151" text-anchor="middle" class="node-title">Validation</text>
  <text x="807" y="169" text-anchor="middle" class="node-sub">字段/模型/契约</text>
  <text x="807" y="186" text-anchor="middle" class="node-sub">result list</text>

  <rect x="222" y="314" width="126" height="74" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="285" y="341" text-anchor="middle" class="node-title">Change Request</text>
  <text x="285" y="359" text-anchor="middle" class="node-sub">changed_fields</text>
  <text x="285" y="376" text-anchor="middle" class="node-sub">risk_level</text>

  <rect x="396" y="314" width="126" height="74" rx="8" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="459" y="341" text-anchor="middle" class="node-title">QC Review</text>
  <text x="459" y="359" text-anchor="middle" class="node-sub">review_id</text>
  <text x="459" y="376" text-anchor="middle" class="node-sub">approved/rejected</text>

  <rect x="570" y="314" width="126" height="74" rx="8" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="633" y="341" text-anchor="middle" class="node-title">Publish Tx</text>
  <text x="633" y="359" text-anchor="middle" class="node-sub">同事务写入</text>
  <text x="633" y="376" text-anchor="middle" class="node-sub">version + outbox</text>

  <rect x="744" y="314" width="126" height="74" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="807" y="341" text-anchor="middle" class="node-title">DLQ / Error</text>
  <text x="807" y="359" text-anchor="middle" class="node-sub">失败原因</text>
  <text x="807" y="376" text-anchor="middle" class="node-sub">可补偿</text>

  <rect x="70" y="494" width="144" height="74" rx="8" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="142" y="520" text-anchor="middle" class="node-title">Product Master</text>
  <text x="142" y="538" text-anchor="middle" class="node-sub">Resource/SPU/SKU</text>
  <text x="142" y="555" text-anchor="middle" class="node-sub">Offer/Rule</text>

  <rect x="256" y="494" width="144" height="74" rx="8" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="328" y="520" text-anchor="middle" class="node-title">Publish Snapshot</text>
  <text x="328" y="538" text-anchor="middle" class="node-sub">订单快照来源</text>
  <text x="328" y="555" text-anchor="middle" class="node-sub">publish_version</text>

  <rect x="442" y="494" width="144" height="74" rx="8" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="514" y="520" text-anchor="middle" class="node-title">Outbox Event</text>
  <text x="514" y="538" text-anchor="middle" class="node-sub">ProductPublished</text>
  <text x="514" y="555" text-anchor="middle" class="node-sub">刷新任务</text>

  <rect x="628" y="494" width="144" height="74" rx="8" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.5"/>
  <text x="700" y="520" text-anchor="middle" class="node-title">Search / Cache</text>
  <text x="700" y="538" text-anchor="middle" class="node-sub">索引与详情缓存</text>
  <text x="700" y="555" text-anchor="middle" class="node-sub">最终一致</text>

  <rect x="814" y="494" width="96" height="74" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="862" y="520" text-anchor="middle" class="node-title">C 端</text>
  <text x="862" y="538" text-anchor="middle" class="node-sub">可搜</text>
  <text x="862" y="555" text-anchor="middle" class="node-sub">可下单</text>

  <path d="M174 161 L222 161" stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="185" y="153" class="arrow-label">input</text>
  <path d="M348 161 L396 161" stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="361" y="153" class="arrow-label">submit</text>
  <path d="M522 161 L570 161" stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="532" y="153" class="arrow-label">normalize</text>
  <path d="M696 161 L744 161" stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="707" y="153" class="arrow-label">validate</text>
  <path d="M807 198 L807 252 L285 252 L285 314" stroke="#16a34a" stroke-width="2.5" fill="none" marker-end="url(#arrow-green)"/>
  <text x="520" y="244" class="arrow-label">validated staging + current version</text>
  <path d="M348 351 L396 351" stroke="#9333ea" stroke-width="2.5" fill="none" marker-end="url(#arrow-purple)"/>
  <text x="356" y="343" class="arrow-label">source policy</text>
  <path d="M522 351 L570 351" stroke="#16a34a" stroke-width="2.5" fill="none" marker-end="url(#arrow-green)"/>
  <text x="528" y="343" class="arrow-label">approved</text>
  <path d="M633 388 L633 440 L142 440 L142 494" stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="334" y="432" class="arrow-label">master data</text>
  <path d="M633 388 L633 454 L328 454 L328 494" stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="424" y="446" class="arrow-label">snapshot</text>
  <path d="M633 388 L633 454 L514 454 L514 494" stroke="#9333ea" stroke-width="2.5" fill="none" marker-end="url(#arrow-purple)"/>
  <text x="540" y="446" class="arrow-label">event</text>
  <path d="M586 531 L628 531" stroke="#9333ea" stroke-width="2.5" fill="none" marker-end="url(#arrow-purple)"/>
  <text x="594" y="523" class="arrow-label">refresh</text>
  <path d="M772 531 L814 531" stroke="#16a34a" stroke-width="2.5" fill="none" marker-end="url(#arrow-green)"/>
  <text x="780" y="523" class="arrow-label">read</text>
  <path d="M459 388 L459 410 L807 410 L807 388" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow-red)"/>
  <text x="612" y="402" class="arrow-label">rejected / failed</text>
  <path d="M807 198 L807 314" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow-red)"/>
  <text x="816" y="262" class="arrow-label">invalid</text>
  <path d="M807 388 L807 440 L459 440 L459 388" stroke="#9333ea" stroke-width="2" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow-purple)"/>
  <text x="620" y="432" class="arrow-label">fix and resubmit</text>

  <text x="32" y="638" class="subtitle">蓝色：主数据流  绿色：准入/读取  紫色：异步事件  红色：失败/驳回补偿</text>
</svg>
