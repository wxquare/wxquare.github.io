[book]
title = "系统设计与架构实战：原理、工程与电商案例"
description = "从系统设计方法论、核心基础设施、可靠性工程到电商业务架构实战；兼顾原理、工程落地、面试表达和完整业务案例。"
authors = ["wxquare"]
language = "zh-CN"
src = "src"

[build]
build-dir = "book"

[preprocessor.mermaid]
command = "python3 ../scripts/mermaid-preprocessor.py"
optional = true

[output.html]
site-url = "/system-design-architecture-book/"
git-repository-url = "https://github.com/wxquare/wxquare.github.io"
additional-js = ["mermaid.min.js", "mermaid-init.js"]

[output.html.fold]
enable = true
level = 0

[output.html.search]
enable = true
