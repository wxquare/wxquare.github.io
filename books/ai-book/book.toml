[book]
title = "AI Agent 工程实践：从大模型基础到生产级智能体系统"
description = "面向工程师的 AI Agent 系统设计指南，涵盖大模型基础、Agent 运行时、工具调用、RAG、Memory、评估治理与生产级案例"
authors = ["wxquare"]
language = "zh-CN"
src = "src"

[build]
build-dir = "book"

[preprocessor.mermaid]
command = "python3 ../scripts/mermaid-preprocessor.py"
optional = true

[output.html]
site-url = "/ai-book/"
git-repository-url = "https://github.com/wxquare/wxquare.github.io"
additional-js = ["mermaid.min.js", "mermaid-init.js"]

[output.html.fold]
enable = true
level = 0

[output.html.search]
enable = true
