[llm]
provider = "deepseek"
base_url = "https://api.deepseek.com"
api_key = "sk-your-deepseek-api-key"
model = "deepseek-v4-flash"
temperature = 0
max_tokens = 4096
timeout = 120
thinking = "disabled"

[agent]
max_steps = 20
auto_edit = true
auto_shell = true

[shell]
allowed_commands = ["python", "python3", "pytest", "ruff", "mypy", "npm", "pnpm", "make", "go"]
timeout = 60
