[book]
title = "程序员系统设计与面试指南：原理、工程与面试"
description = "从计算机基础、核心中间件到系统设计面试与算法题型；原理与工程实践并重，各章面试题不设上限。"
authors = ["wxquare"]
language = "zh-CN"
src = "src"

[build]
build-dir = "book"

[preprocessor.mermaid]
command = "python3 ../scripts/mermaid-preprocessor.py"
optional = true

[output.html]
site-url = "/system-design-book/"
git-repository-url = "https://github.com/wxquare/wxquare.github.io"
additional-js = ["mermaid.min.js", "mermaid-init.js"]

[output.html.fold]
enable = true
level = 0

[output.html.search]
enable = true
